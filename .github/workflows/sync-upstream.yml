name: Sync Upstream and Build

on:
  schedule:
    # 每6小时自动检查上游是否有新提交
    - cron: "0 */6 * * *"
  workflow_dispatch:
    # 支持手动触发

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  sync:
    name: Sync Upstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master (full history)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        shell: bash
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"

      # ─────────────────────────────────────────────
      #  STEP 1 — Sync main repo from rustdesk/rustdesk
      # ─────────────────────────────────────────────
      - name: Add upstream remote & fetch
        shell: bash
        run: |
          git remote add upstream https://github.com/rustdesk/rustdesk.git
          git fetch upstream master

      - name: Check if upstream has new commits
        id: check
        shell: bash
        run: |
          COUNT=$(git rev-list --count master..upstream/master)
          echo "Behind upstream by $COUNT commits"
          echo "behind=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt "0" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream master → master (keep our customizations)
        if: steps.check.outputs.has_update == 'true'
        shell: bash
        run: |
          # -X ours = 遇到冲突时始终保留我们的版本
          # 这样自定义修改(服务器参数/密码/自动接受/托盘等)不会被覆盖
          git merge upstream/master \
            --no-edit --no-ff -X ours

      # ─────────────────────────────────────────────
      #  STEP 2 — Sync hbb_common submodule
      # ─────────────────────────────────────────────
      - name: Sync hbb_common submodule (keep our custom config)
        if: steps.check.outputs.has_update == 'true'
        shell: bash
        run: |
          git submodule update --init --recursive

          cd libs/hbb_common
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"

          # 添加 hbb_common 官方上游
          git remote add upstream https://github.com/rustdesk/hbb_common.git
          git fetch upstream main

          # 合并上游更新，冲突保留我们的版本
          SUB_COUNT=$(git rev-list --count HEAD..upstream/main)
          if [ "$SUB_COUNT" -gt "0" ]; then
            echo "hbb_common is behind upstream by $SUB_COUNT commits, merging..."
            git merge upstream/main --no-edit --no-ff -X ours
          else
            echo "hbb_common is up to date with upstream"
          fi

      - name: Commit submodule update & push changes
        if: steps.check.outputs.has_update == 'true'
        shell: bash
        run: |
          git add libs/hbb_common
          git diff --cached --quiet || \
            git commit -m "chore: sync upstream and update submodule [skip ci]"
          git push origin master

          cd libs/hbb_common
          git push origin main

      - name: Sync complete
        if: steps.check.outputs.has_update == 'true'
        run: echo "✅ Synced with upstream successfully!"
      - name: Already up to date
        if: steps.check.outputs.has_update == 'false'
        run: echo "✅ Already up to date with upstream."

  # ─────────────────────────────────────────────
  #  BUILD — 仅在同步完成后执行
  # ─────────────────────────────────────────────
  build-windows:
    name: Build (Windows x64)
    needs: [sync]
    # 只在同步成功或有手动触发时构建
    if: always() && (needs.sync.outputs.skipped == '' || github.event_name == 'workflow_dispatch')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive
          fetch-depth: 0

      - name: Export GitHub Actions cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15.0.6"

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg" install `
            --triplet x64-windows-static `
            --x-install-root="$env:VCPKG_ROOT\installed"

      - name: Build RustDesk (debug, for quick feedback)
        shell: bash
        run: cargo build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64-debug
          path: target/debug/rustdesk.exe
          if-no-files-found: warn

      - name: Build RustDesk (release, full optimization)
        shell: bash
        run: cargo build --release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64-release
          path: target/release/rustdesk.exe
          if-no-files-found: warn
