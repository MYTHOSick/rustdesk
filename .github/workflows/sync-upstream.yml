# ============================================================================
# Sync Upstream and Build
# ============================================================================
# 此工作流 2 个功能：
# 1. 定期从 rustdesk/rustdesk 同步最新代码到本仓库
# 2. 同步完成后自动构建 Windows x64 版本
#
# ⚠ 同步策略说明：
#   git merge -X ours 确保遇到冲突时始终保留本仓库的修改
#   即：自定义服务器参数、默认密码、隐藏CM、禁用更新等不会被覆盖
# ============================================================================

name: Sync Upstream and Build

on:
  schedule:
    # 每12小时自动检查上游是否有新提交
    - cron: "0 */12 * * *"
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  # ─────────────────────────────────────────────
  #  JOB 1: 同步上游
  # ─────────────────────────────────────────────
  sync:
    name: Sync
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.check.outputs.has_update }}

    steps:
      - name: Checkout master (full history)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure git with credentials
        shell: bash
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Add upstream remote & fetch
        shell: bash
        run: |
          git remote add upstream https://github.com/rustdesk/rustdesk.git
          git fetch upstream master

      - name: Check if upstream has new commits
        id: check
        shell: bash
        run: |
          COUNT=$(git rev-list --count master..upstream/master)
          echo "Behind upstream by $COUNT commits"
          echo "behind=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt "0" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream → master (-X ours to keep our customizations)
        if: steps.check.outputs.has_update == 'true'
        shell: bash
        run: |
          git merge upstream/master --no-edit --no-ff -X ours

      - name: Init & update submodules
        if: steps.check.outputs.has_update == 'true'
        shell: bash
        run: |
          git submodule update --init --recursive

      - name: Sync hbb_common submodule (keep our config)
        if: steps.check.outputs.has_update == 'true'
        shell: bash
        run: |
          cd libs/hbb_common
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git remote add upstream https://github.com/rustdesk/hbb_common.git
          git fetch upstream main
          SUB_COUNT=$(git rev-list --count HEAD..upstream/main)
          if [ "$SUB_COUNT" -gt "0" ]; then
            echo "hbb_common behind by $SUB_COUNT commits → merging..."
            git merge upstream/main --no-edit --no-ff -X ours
          else
            echo "hbb_common already up to date"
          fi

      - name: Commit & push
        if: steps.check.outputs.has_update == 'true'
        shell: bash
        run: |
          # Push submodule ref update within the main repo
          cd "$GITHUB_WORKSPACE"
          git add libs/hbb_common
          git diff --cached --quiet || \
            git commit -m "chore: sync upstream [skip ci]"
          git push origin master

  # ─────────────────────────────────────────────
  #  JOB 2: Windows x64 构建
  # ─────────────────────────────────────────────
  build:
    name: Build (Windows x64)
    needs: [sync]
    # 仅在有新提交或手动触发时构建
    if: |
      always() &&
      (needs.sync.outputs.has_update == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: windows-latest-4core

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive
          fetch-depth: 0

      - name: Export GitHub Actions cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM/clang (for bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15.0.6"

      - name: Setup vcpkg with GitHub Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ runner.workspace }}/vcpkg"
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          & "${{ runner.workspace }}\vcpkg\vcpkg" install --triplet x64-windows-static --x-install-root="$env:VCPKG_ROOT\installed"

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: rustdesk-windows-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rustdesk-windows-

      - name: Build RustDesk (release)
        shell: bash
        run: cargo build --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: target/release/rustdesk.exe
